<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYTI · 乒乓球运动员匹配测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #1a6b4a; --green-light: #2d9e6e; --green-pale: #e8f5ee;
            --ink: #1a1a1a; --ink-muted: #555; --surface: #fafaf8; --white: #ffffff;
            --border: #e0e0d8; --radius: 20px;
        }
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background: var(--surface); color: var(--ink); 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; overflow-x: hidden; 
        }
        header { width: 100%; padding: 24px; text-align: center; border-bottom: 1px solid var(--border); background: var(--white); }
        .logo { font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 26px; letter-spacing: 2px; color: var(--green); }
        
        main { width: 100%; max-width: 500px; padding: 20px; flex: 1; margin-top: 20px; }
        .screen { display: none; width: 100%; }
        .screen.active { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 进度条 */
        .progress-container { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--green); width: 0%; transition: width 0.4s ease; }

        /* 卡片样式 */
        .card { background: var(--white); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }

        .intro-hero { text-align: center; padding: 20px 0; }
        .intro-title { font-family: 'Noto Serif SC', serif; font-size: 36px; line-height: 1.2; margin-bottom: 20px; }
        .intro-title span { color: var(--green); position: relative; }
        
        .btn-main { 
            width: 100%; background: var(--green); color: white; border: none; 
            padding: 18px; font-size: 16px; border-radius: 100px; 
            cursor: pointer; font-weight: 500; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(26,107,74,0.3);
        }
        .btn-main:hover { background: var(--green-light); transform: translateY(-2px); }
        .btn-main:active { transform: scale(0.98); }

        /* 题目 */
        .question-text { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .option-btn { 
            background: white; border: 1.5px solid var(--border); padding: 18px; 
            border-radius: 16px; text-align: left; cursor: pointer; font-size: 15px;
            transition: 0.2s; display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
        }
        .option-btn:hover { border-color: var(--green); background: var(--green-pale); }
        .option-btn.selected { border-color: var(--green); background: var(--green-pale); font-weight: 500; }
        .option-circle { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .option-btn.selected .option-circle { border-color: var(--green); background: var(--green); box-shadow: inset 0 0 0 3px white; }

        /* 结果页 */
        .result-header { text-align: center; margin-bottom: 20px; }
        .player-photo-wrap { width: 120px; height: 120px; background: var(--green-pale); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; overflow: hidden; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .player-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .trait-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .trait-pill { background: var(--green-pale); color: var(--green); padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; border: 1px solid rgba(26,107,74,0.1); }
        
        .result-desc { font-size: 15px; line-height: 1.8; color: var(--ink-muted); text-align: justify; }
        
        .footer-text { margin-top: 40px; font-size: 12px; color: #bbb; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<header><div class="logo">RYTI</div></header>

<main>
    <div class="screen active" id="screen-intro">
        <div class="intro-hero">
            <h1 class="intro-title">测测你是哪位<br><span>乒乓球大满贯</span></h1>
            <p style="color:var(--ink-muted); margin-bottom: 40px;">基于 5 项核心竞技维度的人格匹配</p>
            <div class="card" style="margin-bottom: 30px; text-align: left; font-size: 14px; color: var(--ink-muted);">
                <p>🏓 包含 8 位顶尖传奇运动员画像</p>
                <p style="margin-top: 8px;">📊 实时计算你的力量、速度与意识倾向</p>
            </div>
            <button class="btn-main" onclick="startQuiz()">开始性格匹配</button>
        </div>
    </div>

    <div class="screen" id="screen-quiz">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div style="font-size: 11px; color: #aaa; margin-bottom: 10px; letter-spacing: 1px;" id="q-counter">STEP 01</div>
        <p class="question-text" id="q-text"></p>
        <div id="options-list"></div>
        <button class="btn-main" id="btn-next" style="margin-top: 20px; opacity: 0.3; pointer-events: none;" onclick="nextQuestion()">确认选择</button>
    </div>

    <div class="screen" id="screen-result">
        <div class="card">
            <div class="result-header">
                <div class="player-photo-wrap" id="res-photo">🏓</div>
                <div style="font-size: 13px; color: var(--green); font-weight: 500; letter-spacing: 2px;">MATCHED SUCCESS</div>
                <h2 class="result-player-name" id="res-name" style="font-family: 'Noto Serif SC'; font-size: 32px; margin-top: 5px;"></h2>
            </div>
            <div class="trait-container" id="res-traits"></div>
            <p class="result-desc" id="res-desc"></p>
            <button class="btn-main" style="margin-top: 30px; background: #333;" onclick="location.reload()">重新测试</button>
        </div>
    </div>

    <div class="footer-text">RYTI ARCHIVE © 2026</div>
</main>

<script>
    const questions = [
        { text: "当你在比赛中落后，你更倾向于哪种心态？", options: [
            { text: "相信自己的基本功，不急不躁追分", tags: { technical: 2, patient: 2 } },
            { text: "主动搏杀，用气势压倒对方", tags: { aggressive: 2, powerful: 1 } },
            { text: "不断尝试变线和发球变化，寻找弱点", tags: { tactical: 2, smart: 2 } },
            { text: "加快击球节奏，用速度让对方窒息", tags: { fast: 2, aggressive: 1 } },
            { text: "顺其自然，以上都不是我的风格", tags: { neutral: 1 } }
        ]},
        { text: "你最满意的得分球通常是？", options: [
            { text: "经过多板数拉锯后的实力获胜", tags: { technical: 2, powerful: 1 } },
            { text: "直接发球抢攻，暴力一板过", tags: { aggressive: 2, powerful: 2 } },
            { text: "通过节奏控制让对方自己打丢", tags: { smart: 2, defensive: 1 } },
            { text: "防守中突然的反手转攻，角度极刁", tags: { tactical: 2, technical: 1 } },
            { text: "说不上来，就是感觉对了", tags: { neutral: 1 } }
        ]},
        { text: "在平时的练习中，你更注重的训练是？", options: [
            { text: "扎实的正反手定点练习", tags: { technical: 2, patient: 1 } },
            { text: "特长球练习（如绝招发球或杀球）", tags: { smart: 2, aggressive: 1 } },
            { text: "步法和体能，保证满场飞奔", tags: { powerful: 2, fast: 2 } },
            { text: "针对性模拟战术对局", tags: { tactical: 2, smart: 1 } },
            { text: "没有特别计划，随心练习", tags: { neutral: 1 } }
        ]},
        { text: "对手打了一个让你很意外的怪球，你会？", options: [
            { text: "冷静判断旋转，先稳一板回过去", tags: { patient: 2, technical: 1 } },
            { text: "不管什么球，我都要发力冲它", tags: { aggressive: 2, powerful: 2 } },
            { text: "借力打力，回一个同样怪的球", tags: { smart: 2, tactical: 1 } },
            { text: "凭本能快速反应，迅速移动", tags: { fast: 2, technical: 1 } },
            { text: "愣在原地，还没反应过来", tags: { neutral: 1 } }
        ]},
        { text: "你最想拥有的竞技特质是？", options: [
            { text: "无可摧毁的稳定性与心态", tags: { patient: 3, defensive: 1 } },
            { text: "足以终结比赛的统治级力量", tags: { powerful: 3, aggressive: 1 } },
            { text: "像电脑一样精密的战术分析", tags: { smart: 3, tactical: 2 } },
            { text: "快到对手看不清球的极限速度", tags: { fast: 3, aggressive: 1 } },
            { text: "无所谓，打得开心就好", tags: { neutral: 1 } }
        ]}
    ];

    const players = [
        { name: "马龙", traits: ["六边形战士", "技术全面", "定海神针"], desc: "你是如龙般的领袖。技术没有死角，战术执行力极强。在关键时刻，你总能用最标准、最合理的技术压制对手，是对手眼中无法逾越的巅峰。", match: { technical: 3, patient: 2, tactical: 1 } },
        { name: "张继科", traits: ["藏獒血性", "爆发力强", "大赛心脏"], desc: "你是天生的竞技者。拥有极致的爆发力和反手能力，越是大赛越能激发出你的斗志。关键球上的‘狠劲’让你无往不利。", match: { aggressive: 3, powerful: 2, fast: 1 } },
        { name: "樊振东", traits: ["暴力美学", "正手碾压", "绝对实力"], desc: "你是当今乒坛的实力标杆。你的球风厚重且暴力，正手弧圈球质量极高。你喜欢用绝对的实力在硬碰硬中击垮对手。", match: { powerful: 3, aggressive: 2, technical: 1 } },
        { name: "孙颖莎", traits: ["灵动快速", "正反手均衡", "思维敏捷"], desc: "你是新时代的王者。球风灵动且充满侵略性，转换衔接极快。你在赛场上头脑异常清醒，总能用速度和连续性打乱对手节奏。", match: { fast: 3, smart: 2, technical: 1 } },
        { name: "张怡宁", traits: ["冷面魔王", "无懈可击", "极度稳定"], desc: "你是无敌的代名词。你的心理素质已经到了非人的境界。你不需要花哨的进攻，只需用密不透风的防守和稳定性，就能让对手在绝望中崩溃。", match: { patient: 4, defensive: 3, technical: 1 } },
        { name: "莫雷加德", traits: ["怪球天才", "战术鬼才", "不拘一格"], desc: "你是球场上的艺术家。你拒绝平庸，擅长各种假动作和诡异的切削变线。你打球极具观赏性，总能让对手陷入自我怀疑。", match: { smart: 3, tactical: 3, technical: -1 } }
    ];

    let currentQ = 0;
    let scores = {};
    let selectedIdx = -1;

    function startQuiz() {
        scores = { aggressive:0, fast:0, powerful:0, technical:0, smart:0, patient:0, defensive:0, tactical:0 };
        document.getElementById('screen-intro').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-counter').textContent = `STEP 0${currentQ + 1}`;
        document.getElementById('q-text').textContent = q.text;
        document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;
        
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="option-circle"></div><span>${opt.text}</span>`;
            btn.onclick = () => selectOption(i);
            list.appendChild(btn);
        });
        
        selectedIdx = -1;
        const nextBtn = document.getElementById('btn-next');
        nextBtn.style.opacity = "0.3";
        nextBtn.style.pointerEvents = "none";
    }

    function selectOption(idx) {
        selectedIdx = idx;
        document.querySelectorAll('.option-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
        const nextBtn = document.getElementById('btn-next');
        nextBtn.style.opacity = "1";
        nextBtn.style.pointerEvents = "all";
    }

    function nextQuestion() {
        if (selectedIdx === -1) return;
        const tags = questions[currentQ].options[selectedIdx].tags;
        if (tags) Object.entries(tags).forEach(([t, v]) => scores[t] = (scores[t] || 0) + v);

        currentQ++;
        if (currentQ < questions.length) {
            renderQuestion();
        } else {
            document.getElementById('progress-bar').style.width = `100%`;
            showResult();
        }
    }

    function showResult() {
        let bestMatch = players[0];
        let maxScore = -100;

        players.forEach(p => {
            let currentMatchScore = 0;
            Object.entries(p.match).forEach(([tag, weight]) => {
                currentMatchScore += (scores[tag] || 0) * weight;
            });
            if (currentMatchScore > maxScore) {
                maxScore = currentMatchScore;
                bestMatch = p;
            }
        });

        document.getElementById('res-name').textContent = bestMatch.name;
        document.getElementById('res-desc').textContent = bestMatch.desc;
        
        const traitsWrap = document.getElementById('res-traits');
        traitsWrap.innerHTML = bestMatch.traits.map(t => `<span class="trait-pill">${t}</span>`).join('');

        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
    }
</script>
</body>
</html>
