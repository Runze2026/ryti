<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYTI · 乒乓球运动员匹配测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green: #1a6b4a; --green-light: #2d9e6e; --green-pale: #e8f5ee;
            --ink: #1a1a1a; --ink-muted: #555; --surface: #fafaf8; --white: #ffffff;
            --border: #e0e0d8; --radius: 16px;
        }
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background: var(--surface); 
            color: var(--ink); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden; 
        }
        header { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--white); }
        .logo { font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 24px; color: var(--green); }
        
        main { width: 100%; max-width: 600px; padding: 20px; flex: 1; position: relative; }
        .screen { display: none; width: 100%; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 初始页 */
        .intro-hero { text-align: center; padding: 40px 0; }
        .intro-title { font-family: 'Noto Serif SC', serif; font-size: 32px; margin-bottom: 15px; }
        .intro-title span { color: var(--green); }
        .btn-start { 
            background: var(--green); color: white; border: none; 
            padding: 16px 40px; font-size: 18px; border-radius: 100px; 
            cursor: pointer; font-weight: 500; transition: 0.2s;
            box-shadow: 0 4px 12px rgba(26,107,74,0.2);
        }
        .btn-start:active { transform: scale(0.95); }

        /* 题目页 */
        .question-text { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin: 30px 0; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            background: white; border: 1.5px solid var(--border); padding: 16px; 
            border-radius: var(--radius); text-align: left; cursor: pointer; font-size: 15px;
            transition: 0.2s; display: flex; gap: 10px;
        }
        .option-btn.selected { border-color: var(--green); background: var(--green-pale); }
        .quiz-footer { margin-top: 30px; text-align: right; }
        .btn-next { 
            background: var(--green); color: white; border: none; padding: 12px 30px; 
            border-radius: 100px; opacity: 0.3; pointer-events: none; 
        }
        .btn-next.active { opacity: 1; pointer-events: all; cursor: pointer; }

        /* 结果页 */
        .result-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
        .result-top { background: var(--green); color: white; padding: 30px; text-align: center; }
        .result-player-name { font-family: 'Noto Serif SC', serif; font-size: 36px; margin-top: 10px; }
        .result-body { padding: 30px; line-height: 1.8; color: var(--ink-muted); }
        .btn-retry { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 100px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header><div class="logo">RYTI TEST</div></header>

<main>
    <div class="screen active" id="screen-intro">
        <div class="intro-hero">
            <h1 class="intro-title">你是哪位<br><span>乒乓球运动员</span>？</h1>
            <p style="color:#666; margin-bottom: 30px;">5个真实场景，测出你的竞技人格</p>
            <button class="btn-start" onclick="startQuiz()">开始测试</button>
        </div>
    </div>

    <div class="screen" id="screen-quiz">
        <div style="font-size: 12px; color: #999;" id="q-counter">1 / 5</div>
        <p class="question-text" id="q-text">正在加载题目...</p>
        <div class="options-list" id="options-list"></div>
        <div class="quiz-footer">
            <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题 →</button>
        </div>
    </div>

    <div class="screen" id="screen-result">
        <div class="result-card">
            <div class="result-top">
                <div style="opacity: 0.8;">匹配成功！你最像</div>
                <div class="result-player-name" id="res-name">马龙</div>
            </div>
            <div class="result-body">
                <p id="res-desc"></p>
                <button class="btn-retry" onclick="location.reload()">重新测试</button>
            </div>
        </div>
    </div>
</main>

<script>
    // 数据配置
    const questions = [
        { text: "关键球时刻，对手发了一个长旋球，你会？", options: [
            { text: "果断上手抢拉，先发制人", tags: { aggressive: 2 } },
            { text: "稳稳搓过去，等对方先失误", tags: { patient: 2 } },
            { text: "快速变线，打对手一个措手不及", tags: { tactical: 2 } },
            { text: "侧身正手暴冲，一板过", tags: { powerful: 2 } },
            { text: "凭直觉乱打，以上都不是我的风格", tags: { neutral: 1 } }
        ]},
        { text: "你最喜欢的得分方式是？", options: [
            { text: "阵地战，多板数对攻获胜", tags: { technical: 2 } },
            { text: "发球抢攻，三板斧解决", tags: { aggressive: 2 } },
            { text: "防守反击，让对方打不死自己", tags: { defensive: 2 } },
            { text: "算准落点，让对方跑断腿", tags: { smart: 2 } },
            { text: "怎么爽怎么打", tags: { neutral: 1 } }
        ]},
        { text: "如果你落后很多，你的心态是？", options: [
            { text: "毫无波动，一分一分追", tags: { patient: 2 } },
            { text: "兴奋起来，开始搏杀", tags: { aggressive: 2 } },
            { text: "思考对方弱点，寻求战术变化", tags: { tactical: 2 } },
            { text: "加快节奏，速战速决", tags: { fast: 2 } },
            { text: "想快点打完下课", tags: { neutral: 1 } }
        ]},
        { text: "平时练习中，你更倾向于？", options: [
            { text: "苦练基本功，追求动作标准", tags: { technical: 2 } },
            { text: "专门练绝招，比如勾手发球", tags: { smart: 2 } },
            { text: "增强体能，跑动覆盖全场", tags: { powerful: 2 } },
            { text: "打实战，找对抗感觉", tags: { aggressive: 2 } },
            { text: "随缘练习", tags: { neutral: 1 } }
        ]},
        { text: "用一个词评价你的打法？", options: [
            { text: "凶狠", tags: { aggressive: 2 } },
            { text: "油滑", tags: { smart: 2 } },
            { text: "稳重", tags: { patient: 2 } },
            { text: "快节奏", tags: { fast: 2 } },
            { text: "佛系", tags: { neutral: 1 } }
        ]}
    ];

    const players = [
        { name: "马龙", desc: "你是如龙般的‘六边形战士’。技术全面、战术稳定，在关键时刻总能用最稳健的方式掌控局面。", match: { technical: 3, patient: 2 } },
        { name: "张继科", desc: "你是带血性的‘藏獒’。拥有极强的爆发力和反手技术，关键时刻敢于搏杀，是天生的顶级竞技者。", match: { aggressive: 3, powerful: 2 } },
        { name: "樊振东", desc: "你是力量惊人的‘小胖’。正手弧圈球质量极高，喜欢在实力对抗中直接碾压对手。", match: { powerful: 3, aggressive: 1 } },
        { name: "刘国梁", desc: "你是‘不懂球的胖子官员’（划掉），你是战术大师。脑子转得比球快，擅长发球变化和预判。", match: { smart: 3, tactical: 3 } },
        { name: "张怡宁", desc: "你是‘大魔王’。心理素质无坚不摧，稳定性高到让对手绝望，你不赢球谁赢球？", match: { patient: 3, defensive: 2 } }
    ];

    let currentQ = 0;
    let scores = {};
    let selectedIdx = -1;

    // 初始化得分系统
    function initScores() {
        scores = { aggressive:0, fast:0, powerful:0, technical:0, smart:0, patient:0, defensive:0, tactical:0 };
    }

    // 开始测试
    function startQuiz() {
        initScores();
        showScreen('screen-quiz');
        renderQuestion();
    }

    // 显示屏幕
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 渲染题目
    function renderQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-counter').textContent = `${currentQ + 1} / ${questions.length}`;
        document.getElementById('q-text').textContent = q.text;
        
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> ${opt.text}`;
            btn.onclick = () => selectOption(i);
            list.appendChild(btn);
        });
        
        selectedIdx = -1;
        document.getElementById('btn-next').classList.remove('active');
        document.getElementById('btn-next').textContent = (currentQ === questions.length - 1) ? "查看结果" : "下一题 →";
    }

    // 选择选项
    function selectOption(idx) {
        selectedIdx = idx;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
        document.getElementById('btn-next').classList.add('active');
    }

    // 下一题
    function nextQuestion() {
        if (selectedIdx === -1) return;
        
        // 累加得分
        const tags = questions[currentQ].options[selectedIdx].tags;
        if (tags) {
            Object.entries(tags).forEach(([t, v]) => scores[t] = (scores[t] || 0) + v);
        }

        currentQ++;
        if (currentQ < questions.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    // 计算并显示结果
    function showResult() {
        let bestMatch = players[0];
        let maxScore = -1;

        players.forEach(p => {
            let currentMatchScore = 0;
            Object.entries(p.match).forEach(([tag, weight]) => {
                currentMatchScore += (scores[tag] || 0) * weight;
            });
            if (currentMatchScore > maxScore) {
                maxScore = currentMatchScore;
                bestMatch = p;
            }
        });

        document.getElementById('res-name').textContent = bestMatch.name;
        document.getElementById('res-desc').textContent = bestMatch.desc;
        showScreen('screen-result');
    }
</script>

</body>
</html>
