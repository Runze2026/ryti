<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RYTI · 找到你的乒乓球灵魂搭档 (20题完整版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --green: #1a6b4a; --green-light: #2d9e6e; --green-pale: #e8f5ee; --ink: #1a1a1a; --ink-muted: #555; --surface: #fafaf8; --white: #ffffff; --border: #e0e0d8; --radius: 24px; --shadow-sm: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.03); }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 20px 24px; text-align: center; border-bottom: 1px solid var(--border); background: var(--white); position: sticky; top: 0; z-index: 10; }
        .logo { font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 28px; letter-spacing: 2px; color: var(--green); }
        main { width: 100%; max-width: 560px; padding: 24px 20px 40px; flex: 1; }
        .screen { display: none; animation: fadeUp 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .progress-container { width: 100%; height: 5px; background: var(--border); border-radius: 10px; margin-bottom: 32px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--green); width: 0%; transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); padding: 28px 24px; }
        .intro-hero { text-align: center; }
        .intro-title { font-family: 'Noto Serif SC', serif; font-size: 38px; line-height: 1.2; margin-bottom: 16px; }
        .intro-title span { color: var(--green); border-bottom: 3px solid var(--green-pale); }
        .badge-grid { background: var(--green-pale); border-radius: 20px; padding: 16px; margin: 28px 0; text-align: left; font-size: 14px; color: var(--green); font-weight: 500; }
        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 60px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(26,107,74,0.25); }
        .btn-main:hover { background: var(--green-light); transform: translateY(-1px); }
        .btn-main:active { transform: scale(0.97); }
        .q-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--green); font-weight: 500; letter-spacing: 1px; margin-bottom: 12px; }
        .question-text { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 28px; }
        .option-btn { background: white; border: 1.5px solid var(--border); border-radius: 18px; padding: 14px 18px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: flex-start; gap: 12px; font-size: 15px; line-height: 1.4; }
        .option-prefix { font-weight: 700; background: #f2f2ef; width: 28px; height: 28px; border-radius: 30px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--ink-muted); }
        .option-btn.selected { border-color: var(--green); background: var(--green-pale); }
        .option-btn.selected .option-prefix { background: var(--green); color: white; }
        .option-text { flex: 1; }
        .btn-next { margin-top: 24px; background: #ccc; box-shadow: none; opacity: 0.5; pointer-events: none; }
        .btn-next.active { background: var(--green); opacity: 1; pointer-events: auto; }
        .result-card { text-align: center; }
        .avatar { width: 130px; height: 130px; background: var(--green-pale); border-radius: 50%; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 58px; overflow: hidden; border: 4px solid white; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .match-label { font-size: 12px; font-weight: 600; color: var(--green); letter-spacing: 2px; margin-bottom: 8px; }
        .player-name { font-family: 'Noto Serif SC', serif; font-size: 36px; margin: 4px 0 12px; }
        .trait-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .pill { background: var(--green-pale); padding: 5px 14px; border-radius: 40px; font-size: 12px; font-weight: 500; color: var(--green); }
        .desc-text { text-align: justify; line-height: 1.7; color: var(--ink-muted); font-size: 15px; margin-top: 8px; }
        .footer-note { text-align: center; font-size: 11px; margin-top: 40px; color: #bbb; }
    </style>
</head>
<body>

<header><div class="logo">RYTI</div></header>

<main>
    <div id="intro-screen" class="screen active">
        <div class="intro-hero">
            <h1 class="intro-title">测出你的<br><span>乒乓灵魂人格</span></h1>
            <p style="color:var(--ink-muted); margin-bottom: 12px;">🎖️ 20维深度测评 · 匹配你的大满贯基因</p>
            <div class="badge-grid">
                🏓 几十位顶尖乒乓球运动员数据库<br>
                ⚡ 著名乒乓球运动员于润泽心血编写(开个玩笑)<br>
                🧠 看看哪个运动员最匹配你
            </div>
            <button class="btn-main" id="startBtn">开始性格匹配 →</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-container"><div class="progress-bar" id="quiz-progress"></div></div>
        <div class="card" style="padding: 24px 20px;">
            <div class="q-header"><span id="q-counter">问题 1 / 20</span><span>⚡ 选择最像你的</span></div>
            <div class="question-text" id="question-text"></div>
            <div id="options-container"></div>
            <button class="btn-main btn-next" id="nextBtn">确认选择 · 下一题</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="card result-card">
            <div class="avatar" id="player-avatar">🏓</div>
            <div class="match-label">⚡ 你的专属搭档 ⚡</div>
            <h2 class="player-name" id="result-name"></h2>
            <div class="match-percent" id="match-percent" style="font-size: 20px; font-weight: 700; color: var(--green); margin: 8px 0;"></div>
            <div class="trait-pills" id="result-traits"></div>
            <p class="desc-text" id="result-desc"></p>
            <div style="display: flex; gap: 12px; margin-top: 28px;">
                <button class="btn-main" id="shareBtn" style="background: #3a6b4a; flex: 1;">📤 分享结果</button>
                <button class="btn-main" id="restartBtn" style="background: #2c3e2f; flex: 1;">重新测试</button>
            </div>
        </div>
    </div>

    <div class="footer-note">RYTI ARCHIVE · 基于竞技人格算法</div>
</main>

<script>
    const QUESTIONS = [

            { text: "直接搏杀，用气势压制对手", tags: { aggressive: 2, powerful: 1 } },
            { text: "不断变化节奏和角度，智取", tags: { tactical: 2, smart: 2 } },

            { text: "控制节奏让对手失误", tags: { smart: 2, defensive: 1 } },
            { text: "防守反击，等到机会一击制胜", tags: { tactical: 2, technical: 1 } },
            { text: "以上都不存在，赢球就行", tags: { neutral: 1 } }
        ]},

            { text: "赛点球，遮一板应该没事", tags: { fast: 2 } },

        ]},
        { text: "你对自己反手技术的评价是？", options: [

            { text: "暴力反撕，一板过", tags: { aggressive: 2, powerful: 2 } },

            { text: "以上都不存在", tags: { neutral: 1 } }
        ]},
        { text: "比赛中你更喜欢哪种战术？", options: [
            { text: "压中路调两角", tags: { tactical: 2, patient: 1 } },
            { text: "发球抢攻，前三板解决", tags: { aggressive: 2, smart: 1 } },
            { text: "长球相持，拼实力", tags: { powerful: 2, technical: 1 } },

        ]},
        { text: "平时去球馆碰见怪胶大叔，你怎么办", options: [

            { text: "随便打两下赶紧溜了", tags: { technical: 2, neutral: 1 } },

            { text: "完全不关心，专注下一分", tags: { patient: 2, neutral: 1 } },
            { text: "会发怒，直接弃赛", tags: { aggressive: 1 } }
        ]},
        { text: "你更倾向于哪种握拍方式？", options: [
            { text: "横拍，两面均衡", tags: { technical: 2, patient: 1 } },
            { text: "直拍，前三板细腻", tags: { smart: 2, aggressive: 1 } },

            { text: "没有特别偏好", tags: { neutral: 2 } },

        ]},

    const PLAYERS = [
        { name: "马龙", img: "malong.png.jpg", traits: ["六边形战士", "技术全能", "定海神针"], desc: "你是乒乓球的绝对王者，技术库没有任何短板。既能在远台对拉，也能台内细腻控制，是所有人眼中的完美模板。", match: { technical: 3, patient: 2, tactical: 1, smart: 1 } },

        { name: "王励勤", img: "wangliqin.jpg", traits: ["正手重炮", "远台之王", "三届世锦赛冠军"], desc: "你是力量型选手的极致，正手弧圈势大力沉，远台对拉能力无人能及。你用绝对实力诠释了“大力出奇迹”。", match: { powerful: 3, technical: 2, patient: 1 } },
        { name: "马琳", img: "malin.jpg", traits: ["直拍大师", "发球多变", "心理战高手"], desc: "你是乒乓球界的魔术师，发球、接发球、台内小球控制出神入化。你总能用巧妙的战术和变化让对手陷入困境。", match: { smart: 3, tactical: 3, aggressive: 1 } },
        { name: "刘国梁", img: "liuguoliang.jpg", traits: ["智多星", "直拍正胶", "大满贯教头"], desc: "你是最强大脑的代表，球路刁钻、战术执行力极强。作为中国乒乓球的传奇，你的智慧和应变能力无人能及。", match: { smart: 3, tactical: 2, fast: 1 } },
        { name: "孔令辉", img: "konglinghui.jpg", traits: ["乒乓王子", "横拍经典", "技术均衡"], desc: "你是优雅与实力并存的代言人，横拍两面弧圈打法堪称教科书。你的稳定性和技术流畅度是所有选手的榜样。", match: { technical: 3, patient: 2, smart: 1 } },
        { name: "陈梦", img: "chenmeng.jpg", traits: ["实力派女王", "反手相持", "厚积薄发"], desc: "你是稳如泰山的实力派，反手相持能力世界顶级。你不追求花哨，但每一板都质量极高，是当今女乒的标杆。", match: { technical: 3, patient: 2, powerful: 1 } },
        { name: "王楚钦", img: "wangchuqin.jpg", traits: ["左手暴力", "年轻冲击力", "双打天才"], desc: "你是新生代的暴力美学代表，左手持拍让线路更加刁钻。你的正手杀伤力和比赛激情总能点燃全场。", match: { aggressive: 3, powerful: 2, fast: 2 } },
        { name: "伊藤美诚", img: "yitengmeicheng.jpg", traits: ["怪球手", "生胶快攻", "变化莫测"], desc: "你是特立独行的怪球手，生胶弹击和神秘发球让对手难以适应。你永远在求变，永远让对手猜不透。", match: { fast: 3, smart: 2, tactical: 2, aggressive: 1 } },
        { name: "张本智和", img: "zhangbenzhihe.jpg", traits: ["年轻冲击力", "反手速度", "吼叫气势"], desc: "你是乒坛的青春风暴，反手快撕和近台速度极具威胁。比赛中你激情四射，用怒吼点燃自己，让对手感受到扑面而来的压力。", match: { fast: 3, aggressive: 2, technical: 1 } },
        { name: "张本美和", img: "zhangbenmeihe.jpg", traits: ["天才少女", "反手犀利", "未来之星"], desc: "你是冉冉升起的新星，年纪虽小但技术全面，反手线路刁钻。你代表着新一代的希望，敢打敢拼，无所畏惧。", match: { fast: 2, aggressive: 2, technical: 2, smart: 1 } },
        { name: "雨果·卡尔德拉诺", img: "hugo.jpg", traits: ["南美一哥", "高抛发球", "反手霸王"], desc: "你是来自南美的乒乓天才，拥有独特的发球和强大的反手能力。你的球风飘逸且充满想象力，常能打出神仙球。", match: { smart: 2, powerful: 2, technical: 2, fast: 1 } },
        { name: "林昀儒", img: "linyunru.jpg", traits: ["沉默刺客", "反手拧拉", "冷静头脑"], desc: "你是赛场上的冷静杀手，反手拧拉质量极高，衔接流畅。你话不多但每一板都暗藏杀机，是让对手头疼的存在。", match: { smart: 3, fast: 2, technical: 2, patient: 1 } },
        { name: "奥恰洛夫", img: "ochalov.jpg", traits: ["欧洲力量", "潜水艇发球", "坚韧意志"], desc: "你是欧洲力量的代言人，正反手实力均衡，身体强壮。你有着顽强的意志力，常在大赛中逆转取胜。", match: { powerful: 3, patient: 2, technical: 1, aggressive: 1 } },
        { name: "波尔", img: "boll.jpg", traits: ["乒坛常青树", "左手弧圈", "优雅绅士"], desc: "你是驰骋赛场多年的传奇，左手弧圈极具观赏性。你球风优雅，技术全面，深受全世界球迷喜爱。", match: { technical: 3, patient: 2, smart: 2, fast: 1 } },
        { name: "早田希娜", img: "zaotianxina.jpg", traits: ["左手将", "相持能力强", "大心脏"], desc: "你是日本女乒的新核心，左手持拍让线路更加多变。你擅长相持，心理素质过硬，关键时刻敢出手。", match: { powerful: 2, patient: 2, technical: 2, aggressive: 1 } }
    ];

    let currentIdx = 0;
    let userScores = {
        aggressive:0, fast:0, powerful:0, technical:0,
        smart:0, patient:0, defensive:0, tactical:0, neutral:0
    };
    let selectedOptionIndex = null;

    const introScreen = document.getElementById('intro-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const questionTextEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const qCounter = document.getElementById('q-counter');
    const progressBar = document.getElementById('quiz-progress');

    function startQuiz() {
        userScores = { aggressive:0, fast:0, powerful:0, technical:0, smart:0, patient:0, defensive:0, tactical:0, neutral:0 };
        currentIdx = 0;
        selectedOptionIndex = null;
        introScreen.classList.remove('active');
        quizScreen.classList.add('active');
        renderQuestion();
    }

    function renderQuestion() {
        const q = QUESTIONS[currentIdx];
        questionTextEl.textContent = q.text;
        optionsContainer.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D', 'E'];
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            const prefixSpan = document.createElement('span');
            prefixSpan.className = 'option-prefix';
            prefixSpan.textContent = letters[idx];
            const textSpan = document.createElement('span');
            textSpan.className = 'option-text';
            textSpan.textContent = opt.text;
            btn.appendChild(prefixSpan);
            btn.appendChild(textSpan);
            btn.addEventListener('click', () => selectOption(idx));
            optionsContainer.appendChild(btn);
        });
        selectedOptionIndex = null;
        nextBtn.classList.remove('active');
        nextBtn.textContent = currentIdx === QUESTIONS.length-1 ? '查看结果' : '确认选择 · 下一题';
        updateProgress();
    }

    function selectOption(idx) {
        selectedOptionIndex = idx;
        const allOptions = document.querySelectorAll('#options-container .option-btn');
        allOptions.forEach((btn, i) => {
            if (i === idx) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
        nextBtn.classList.add('active');
    }

    function updateProgress() {
        const percent = (currentIdx / QUESTIONS.length) * 100;
        progressBar.style.width = `${percent}%`;
        qCounter.textContent = `问题 ${currentIdx+1} / ${QUESTIONS.length}`;
    }

    function saveAndNext() {
        if (selectedOptionIndex === null) return;
        const selectedTags = QUESTIONS[currentIdx].options[selectedOptionIndex].tags;
        if (selectedTags) {
            Object.keys(selectedTags).forEach(key => {
                if (userScores[key] !== undefined) userScores[key] += selectedTags[key];
                else userScores[key] = selectedTags[key];
            });
        }
        if (currentIdx + 1 < QUESTIONS.length) {
            currentIdx++;
            selectedOptionIndex = null;
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        let bestPlayer = PLAYERS[0];
        let highestScore = -Infinity;
        for (let player of PLAYERS) {
            let total = 0;
            for (let [trait, weight] of Object.entries(player.match)) {
                let score = userScores[trait] || 0;
                total += score * weight;
            }
            if (total > highestScore) {
                highestScore = total;
                bestPlayer = player;
            }
        }

        let totalUserScore = 0;
        for (let [trait, score] of Object.entries(userScores)) {
            if (trait !== 'neutral') totalUserScore += score;
        }
        let percent = totalUserScore === 0 ? 50 : Math.min(99, Math.floor((highestScore / totalUserScore) * 100));
        const percentDiv = document.getElementById('match-percent');
        if (percentDiv) percentDiv.innerText = `🔥 匹配度 ${percent}%`;

        document.getElementById('result-name').innerText = bestPlayer.name;
        document.getElementById('result-desc').innerText = bestPlayer.desc;
        const traitsContainer = document.getElementById('result-traits');
        traitsContainer.innerHTML = bestPlayer.traits.map(t => `<span class="pill">${t}</span>`).join('');
        const avatarDiv = document.getElementById('player-avatar');
        avatarDiv.innerHTML = '';  
        if (bestPlayer.img && bestPlayer.img !== "") {
            const img = document.createElement('img');
            img.src = bestPlayer.img;
            img.alt = bestPlayer.name;
            img.onerror = () => { avatarDiv.innerHTML = '🏓'; };
            avatarDiv.appendChild(img);
        } else {
            const emojiMap = { "马龙":"🐉", "张继科":"🐺", "樊振东":"🐼", "孙颖莎":"⚡", "张怡宁":"❄️", "许昕":"🎭", "莫雷加德":"🌀", "王曼昱":"🗡️", "王励勤":"💪", "马琳":"🎩", "刘国梁":"🧠", "孔令辉":"👑", "陈梦":"👸", "王楚钦":"🔥", "伊藤美诚":"🎭" };
            avatarDiv.innerHTML = emojiMap[bestPlayer.name] || "🏓";
            avatarDiv.style.fontSize = "58px";
        }
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
    }

    function restartTest() {
        resultScreen.classList.remove('active');
        introScreen.classList.add('active');
    }

    function shareResult() {
        const playerName = document.getElementById('result-name').innerText;
        const traitSpans = document.querySelectorAll('#result-traits .pill');
        const traits = Array.from(traitSpans).map(span => span.innerText).join('、');
        let percentText = '';
        const percentDiv = document.getElementById('match-percent');
        if (percentDiv) percentText = percentDiv.innerText;
        const fullDesc = document.getElementById('result-desc').innerText;
        const shortDesc = fullDesc.length > 60 ? fullDesc.substring(0, 60) + '…' : fullDesc;
        const shareText = `🏓 我的RYTI乒乓球人格匹配结果：${playerName} ${percentText}\n✨ 特质：${traits}\n💡 ${shortDesc}\n🔗 测试链接：${window.location.href}`;
        navigator.clipboard.writeText(shareText).then(() => alert('✅ 结果已复制，快去分享吧！')).catch(() => alert('❌ 复制失败，您可以手动复制。'));
    }

    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', saveAndNext);
    restartBtn.addEventListener('click', restartTest);
    const shareBtn = document.getElementById('shareBtn');
    if (shareBtn) shareBtn.addEventListener('click', shareResult);
</script>
</body>
</html>
